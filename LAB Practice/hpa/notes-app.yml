apiVersion: apps/v1
kind: Deployment
metadata:
  name: notes-app
  namespace: notes-ns

spec:
  replicas: 1

  selector:
    matchLabels:
      app: notes-app

  template:
    metadata:
      labels:
        app: notes-app

    spec:
      containers:
      - name: notes-app
        image: nginx

        ports:
        - containerPort: 80

        resources:
          requests:
            cpu: 100m
            memory: 128Mi

          limits:
            cpu: 500m
            memory: 256Mi
